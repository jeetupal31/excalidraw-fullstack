version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: whiteboard-postgres
    environment:
      POSTGRES_DB: whiteboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whiteboard-server
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whiteboard?schema=public
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: node:20-alpine
    container_name: whiteboard-client
    working_dir: /app/client
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_WS_BASE_URL: ws://localhost:3000
    volumes:
      - ./client:/app/client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  postgres_data:
